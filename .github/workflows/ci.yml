name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ '3.10', '3.11', '3.12', '3.13' ]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: python -m pip install --upgrade pip && pip install uv

      - name: Sync project (uv sync)
        run: uv sync

      - name: Lint (ruff)
        run: |
          uv run ruff check
          uv run ruff format --check

      - name: Tests (pytest + coverage)
        run: uv run pytest

      - name: Upload coverage to Codecov (only on 3.13)
        if: matrix.python-version == '3.13'
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          flags: unittests
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  android:
    name: Android (assembleDebug)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Gradle assembleDebug
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon assembleDebug
