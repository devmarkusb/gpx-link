name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  commit-messages:
    name: Conventional commits
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install --upgrade pip && pip install uv

      - name: Sync project (uv sync --locked)
        run: uv sync --locked

      - name: Validate commit messages (pull request)
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          while read -r sha; do
            git log -1 --pretty=%B "$sha" > /tmp/commit-msg.txt
            uv run pre-commit run conventional-pre-commit --hook-stage commit-msg \
              --commit-msg-filename /tmp/commit-msg.txt
          done < <(git rev-list --reverse "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}")

      - name: Validate commit messages (push)
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        run: |
          set -euo pipefail
          while read -r sha; do
            git log -1 --pretty=%B "$sha" > /tmp/commit-msg.txt
            uv run pre-commit run conventional-pre-commit --hook-stage commit-msg \
              --commit-msg-filename /tmp/commit-msg.txt
          done < <(git rev-list --reverse "${{ github.event.before }}..${{ github.event.after }}")

      - name: Validate commit messages (push, new ref)
        if: github.event_name == 'push' && github.event.before == '0000000000000000000000000000000000000000'
        run: |
          git log -1 --pretty=%B "${{ github.event.after }}" > /tmp/commit-msg.txt
          uv run pre-commit run conventional-pre-commit --hook-stage commit-msg \
            --commit-msg-filename /tmp/commit-msg.txt

  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ '3.10', '3.13' ]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: python -m pip install --upgrade pip && pip install uv

      - name: Sync project (uv sync --locked)
        run: uv sync --locked

      - name: Audit dependencies (uv)
        run: uv audit --preview-features audit --locked

      - name: Lint (ruff)
        run: |
          uv run ruff check
          uv run ruff format --check

      - name: Tests (pytest + coverage)
        run: uv run pytest

      - name: Upload coverage to Codecov (only on 3.13)
        if: matrix.python-version == '3.13'
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage.xml
          flags: unittests
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  android:
    name: Android (assembleDebug)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Gradle assembleDebug
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon assembleDebug
