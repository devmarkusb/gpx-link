name: Android Play release

# Builds a signed release AAB (Google Play default) and APK, attaches them to the GitHub
# release for tag v*, and optionally uploads to Play Console when PLAY_SERVICE_ACCOUNT_JSON is set.
#
# Required GitHub secrets for signed builds:
#   ANDROID_KEYSTORE_BASE64   — base64 of the upload keystore .jks
#   ANDROID_KEYSTORE_PASSWORD
#   ANDROID_KEY_ALIAS
#   ANDROID_KEY_PASSWORD
# Optional (Play API upload):
#   PLAY_SERVICE_ACCOUNT_JSON — full JSON body of the Play Console service account key

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      track:
        description: Google Play track
        required: true
        default: internal
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
      upload_store_listing:
        description: Push fastlane metadata to Play (title, descriptions)
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      PLAY_TRACK: ${{ inputs.track || 'internal' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Decode upload keystore
        working-directory: android
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "Missing secret ANDROID_KEYSTORE_BASE64"
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > upload-keystore.jks

      - name: Write keystore.properties
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          for name in ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            eval "v=\${$name}"
            if [ -z "$v" ]; then echo "Missing secret $name"; exit 1; fi
          done
          {
            echo "storeFile=upload-keystore.jks"
            echo "storePassword=$ANDROID_KEYSTORE_PASSWORD"
            echo "keyAlias=$ANDROID_KEY_ALIAS"
            echo "keyPassword=$ANDROID_KEY_PASSWORD"
          } > keystore.properties

      - name: Gradle release bundle + APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon bundleRelease assembleRelease

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: gpx-link-android-release
          path: |
            android/app/build/outputs/bundle/release/*.aab
            android/app/build/outputs/apk/release/*.apk

      - name: Attach AAB and APK to GitHub Release (tag builds only)
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eux
          TAG="${GITHUB_REF#refs/tags/}"
          gh release upload "$TAG" \
            android/app/build/outputs/bundle/release/app-release.aab \
            android/app/build/outputs/apk/release/app-release.apk \
            --clobber

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler: "2.5.23"
          bundler-cache: true
          working-directory: android

      - name: Upload to Google Play
        working-directory: android
        env:
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$PLAY_SERVICE_ACCOUNT_JSON" ]; then
            echo "PLAY_SERVICE_ACCOUNT_JSON not set; skipping Play upload."
            exit 0
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.upload_store_listing }}" = "true" ]; then
            bundle exec fastlane upload_play_with_metadata "track:$PLAY_TRACK"
          else
            bundle exec fastlane upload_play "track:$PLAY_TRACK"
          fi
