name: Release

on:
  push:
    branches: [ main ]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version:
    name: Semantic release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      released: ${{ steps.sr.outputs.released }}
      release_tag: ${{ steps.release_tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install --upgrade pip && pip install uv

      - name: Sync project
        run: uv sync --locked

      - name: Bump version, tag, and GitHub release
        id: sr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run python -m semantic_release version

      # Pushes made with GITHUB_TOKEN do not fire other workflows' `on: push` (e.g. tag pushes).
      # Resolve the new tag here and dispatch Android Play explicitly (below).
      - name: Resolve release tag
        id: release_tag
        if: steps.sr.outputs.released == 'true'
        run: |
          git fetch origin --tags
          tag=$(git tag --points-at HEAD | grep -E '^v[0-9]' | sort -V | tail -1)
          if [ -z "$tag" ]; then
            echo "::error::No v* tag on HEAD after semantic-release"
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  android-play:
    name: Trigger Android Play release
    needs: version
    if: needs.version.outputs.released == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Dispatch Android Play workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run android-play.yml \
            --repo "${{ github.repository }}" \
            --ref "${{ needs.version.outputs.release_tag }}" \
            -f track=internal \
            -f upload_store_listing=false

  publish:
    name: Publish to PyPI
    needs: version
    if: needs.version.outputs.released == 'true'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.version.outputs.release_tag }}

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install --upgrade pip && pip install uv

      - name: Sync project (no dev)
        run: uv sync --no-dev

      - name: Build distributions
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
